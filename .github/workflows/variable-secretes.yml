name: Explore Varibale and Secretes
on:
    workflow_dispatch:

jobs:
    docker:
        runs-on: ubuntu-latest
        steps:
    
        -   name: build docker
            
        
            run: echo docker build -t ${{ env.CONTAINER_REGISTRY}}/${{env.DOCKER_USERNAME}}/$IMAGE_NAME:latest
        -   name: docker login
            run: echo docker login --username=${{env.DOCKER_USERNAME}} --password=${{secrets.DOCKER_PASSWORD}}
        -   name: docker publish
            run: echodocker push ${{env.CONTAINER_REGISTRY}}/${{env.DOCKER_USERNAME}}/${{secrets.DOCKER_PASSWORD}}
            
    deploy:
        needs: docker
        runs-on: ubuntu-latest
        concurrency: 
            group: production
        steps:
        -    name:  docker run
             run:  |
             echo docker run -d -p 8080:80 {{env.CONTAINER_REGISTRY}}/{{env.DOCKER_USERNAME}}/{{ secrets.DOCKER_PASSWORD }}
             sleep 600s
              

name: Explore Varibale and Secretes
on:
    workflow_dispatch:

jobs:
    docker:
        runs-on: ubuntu-latest
        steps:
    
        -   name: build docker
            
        
            run: echo docker build -t ${{ env.CONTAINER_REGISTRY}}/${{env.DOCKER_USERNAME}}/$IMAGE_NAME:latest
        -   name: docker login
            run: echo docker login --username=${{env.DOCKER_USERNAME}} --password=${{secrets.DOCKER_PASSWORD}}
        -   name: docker publish
            run: echo docker push ${{env.CONTAINER_REGISTRY}}/${{env.DOCKER_USERNAME}}/${{secrets.DOCKER_PASSWORD}}
            
    deploy:
        needs: docker
        runs-on: ubuntu-latest
        concurrency: 
            group: production
            cancel-in-progress: true
        steps:
        -    name:  docker run
             timeout-minutes: 1
             run:  echo docker run -d -p 8080:80 $CONTAINER_REGISTRY/${{ env.DOCKER_USERNAME }}/$IMAGE_NAME:latest
        -    name: sleepin mode 
             timeout-minutes: 1
             run: sleep 600s    
            
              
